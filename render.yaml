services:
  - type: web
    name: on-campus-hostel-booking
    env: node
    region: frankfurt # Can be skipped or defined
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set your production database URL in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
