services:
  - type: web
    name: on-campus-hostel-booking
    env: node
    region: frankfurt # Can be skipped or defined
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false # Set your production database URL in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
